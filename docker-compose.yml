version: "3.9"

services:
  # ── Backend — FastAPI ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orchestrai-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database across container restarts
      - orchestrai-db:/app
    networks:
      - orchestrai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend — Vite → Nginx ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orchestrai-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - orchestrai-net

volumes:
  orchestrai-db:
    driver: local

networks:
  orchestrai-net:
    driver: bridge
